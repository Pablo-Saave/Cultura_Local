{
  "name": "cultura-local-frontend",
  "build": {
    "command": "npm run build",
    "publish": "dist",
    "environment": {
      "VITE_API_URL": "https://tu-backend.onrender.com"
    }
  },
  "redirects": [
    {
      "from": "http://culturalocal.cl/*",
      "to": "https://www.culturalocal.cl/:splat",
      "status": 301,
      "force": true
    },
    {
      "from": "https://culturalocal.cl/*",
      "to": "https://www.culturalocal.cl/:splat",
      "status": 301,
      "force": true
    },
    {
      "source": "/*",
      "destination": "/index.html",
      "type": 301,
      "statusCode": 301
    }
  ]
}
