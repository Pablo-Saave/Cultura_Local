<!-- 
  index.html - Plantilla HTML base
  Plantilla HTML base. Define el <div id="root"> donde React monta la aplicaci�n y carga el script principal.
-->
<!doctype html>
<html lang="es">
  <head>
    <!-- Configuraci�n de caracteres UTF-8 para soportar texto en espa�ol -->
    <meta charset="UTF-8" />
    
    <!-- Configuraci�n para hacer el sitio responsive en dispositivos m�viles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <meta name="language" content="Spanish" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Fundación Cultura Local" />
    <meta name="keywords" content="cultura local, Chile, eventos culturales, proyectos culturales, participación juvenil, patrimonio cultural" />
    
    <!-- Título que aparece en la pestaña del navegador -->
    <title>Fundacion Cultura Local</title>
    
    <!-- Descripción para SEO y redes sociales -->
    <meta name="description" content="Potenciamos la cultura local a través de la participación juvenil y el rescate de nuestras prácticas territoriales." />
    
    <!-- Open Graph Meta Tags para redes sociales -->
    <meta property="og:type" content="website" />

    <meta property="og:description" content="Potenciamos la cultura local a través de la participación juvenil y el rescate de nuestras prácticas territoriales." />
    <meta property="og:site_name" content="Cultura Local" />
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fundación Cultura Local" />
    <meta name="twitter:description" content="Potenciamos la cultura local a través de la participación juvenil y el rescate de nuestras prácticas territoriales." />
    
    <!-- Favicon - icono que aparece en la pestaña -->
    <link rel="icon" type="image/png" href="/img/imagen12.png" />
    
    <!-- Fuentes de Google Fonts - Inter para texto y Playfair Display para títulos -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Fuente Aktifo para t�tulos -->
    <link href="https://fonts.cdnfonts.com/css/aktifo-a" rel="stylesheet">
  </head>
  <body>
    <!-- Contenedor principal donde React montar� toda la aplicaci�n -->
    <div id="root"></div>
    
    <!-- Script principal que carga React y toda la aplicaci�n -->
    <!-- type="module" permite usar import/export de ES6 -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
